spring:
  application:
    name: pnc-parcial-final-hotel

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    access-token-expiration-ms: 900000     # 15 minutos
    refresh-token-expiration-ms: 604800000 # 7 días