version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hotel_db_container
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_app_container
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hotel_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dXNlcndpdGhhZGRyZXNzYWN0aXZhdGluZ3JlbGF0aW9uc2hpcG5ld3NsZXR0ZXJzaWduYXR1cmU=}
      APP_JWT_ACCESS_TOKEN_EXPIRATION_MS: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:-86400000}
    ports:
      - "8080:8080"
    networks:
      - hotel_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  hotel_network:
    driver: bridge

